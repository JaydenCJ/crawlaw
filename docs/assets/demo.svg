<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="430" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">crawlaw — proof of what your robots.txt actually permits</text>

  <text x="24" y="62" fill="#7ee787">$ crawlaw audit robots.txt</text>
  <text x="24" y="86" fill="#c9d1d9">crawlaw audit — robots.txt — 30 known bots, path /</text>

  <text x="24" y="116" fill="#e3b341">AI training — 7 of 15 blocked</text>
  <text x="24" y="138" fill="#8b949e">  bot                 operator      verdict   how</text>
  <text x="24" y="158" fill="#c9d1d9">  GPTBot              OpenAI        <tspan fill="#3fb950">blocked</tspan>   explicit "gptbot" group (line 4)</text>
  <text x="24" y="178" fill="#c9d1d9">  ClaudeBot           Anthropic     <tspan fill="#3fb950">blocked</tspan>   explicit "claudebot" group (line 4)</text>
  <text x="24" y="198" fill="#c9d1d9">  Bytespider          ByteDance     <tspan fill="#3fb950">blocked</tspan> <tspan fill="#d29922">(!) compliance disputed</tspan></text>
  <text x="24" y="218" fill="#c9d1d9">  FacebookBot         Meta          <tspan fill="#f85149">allowed</tspan>   "*" group (line 16)</text>
  <text x="24" y="238" fill="#c9d1d9">  Amazonbot           Amazon        <tspan fill="#f85149">allowed</tspan>   "*" group (line 16)</text>

  <text x="24" y="268" fill="#e3b341">AI on-demand fetchers — 0 of 5 blocked</text>
  <text x="24" y="288" fill="#c9d1d9">  Perplexity-User     Perplexity    <tspan fill="#f85149">allowed</tspan>   "*" group (line 16)</text>

  <text x="24" y="318" fill="#7ee787">$ crawlaw diff deployed.txt candidate.txt</text>
  <text x="24" y="340" fill="#c9d1d9">6 decisions changed:</text>
  <text x="24" y="360" fill="#c9d1d9">  * (any other bot)  /internal/   <tspan fill="#f85149">blocked → allowed</tspan></text>
  <text x="24" y="380" fill="#c9d1d9">  gptbot             /            <tspan fill="#3fb950">allowed → blocked</tspan></text>
  <text x="24" y="408" fill="#8b949e">exit 1 — a policy change your pipeline can gate on</text>
</svg>
